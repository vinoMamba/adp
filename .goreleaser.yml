version: 2

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/vinoMamba/adp/internal/buildinfo.Version={{.Version}}
      - -X github.com/vinoMamba/adp/internal/buildinfo.Commit={{.ShortCommit}}
      - -X github.com/vinoMamba/adp/internal/buildinfo.Date={{.Date}}

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip

release:
  # Ship the one-liner installer alongside the archives so users can do
  # `curl -fsSL .../releases/latest/download/adp-installer.sh | bash`.
  extra_files:
    - glob: ./scripts/install.sh
      name_template: adp-installer.sh

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
