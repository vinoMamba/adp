<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADP 客户知识库</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
    color: #1f2328;
    background: #fff;
    display: flex;
    height: 100vh;
    overflow: hidden;
  }

  /* Sidebar */
  .sidebar {
    width: 280px;
    min-width: 280px;
    background: #f6f8fa;
    border-right: 1px solid #d0d7de;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-header {
    padding: 16px;
    border-bottom: 1px solid #d0d7de;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .sidebar-header h1 {
    font-size: 14px;
    font-weight: 600;
    flex: 1;
  }

  .search-box {
    padding: 8px 16px;
    border-bottom: 1px solid #d0d7de;
  }

  .search-box input {
    width: 100%;
    padding: 6px 10px;
    border: 1px solid #d0d7de;
    border-radius: 6px;
    font-size: 13px;
    outline: none;
    background: #fff;
  }

  .search-box input:focus {
    border-color: #0969da;
    box-shadow: 0 0 0 3px rgba(9,105,218,0.2);
  }

  .tree {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
  }

  .tree-item {
    cursor: pointer;
    padding: 5px 12px 5px 0;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 4px;
    color: #1f2328;
    user-select: none;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .tree-item:hover { background: #eaeef2; }
  .tree-item.active { background: #ddf4ff; color: #0969da; font-weight: 500; }
  .tree-item.hidden { display: none; }

  .tree-item .icon {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    font-size: 12px;
    color: #656d76;
  }

  .tree-item .arrow {
    width: 16px;
    text-align: center;
    flex-shrink: 0;
    font-size: 10px;
    color: #656d76;
    transition: transform 0.15s;
  }

  .tree-item .arrow.expanded { transform: rotate(90deg); }
  .tree-children { display: none; }
  .tree-children.open { display: block; }

  /* Main content */
  .main {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .breadcrumb {
    padding: 10px 24px;
    border-bottom: 1px solid #d0d7de;
    font-size: 13px;
    color: #656d76;
    background: #f6f8fa;
    min-height: 40px;
    display: flex;
    align-items: center;
  }

  .breadcrumb span { color: #1f2328; }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 48px;
    max-width: 980px;
  }

  /* Markdown styles (GitHub-like) */
  .content h1 { font-size: 2em; font-weight: 700; border-bottom: 1px solid #d0d7de; padding-bottom: .3em; margin: 0 0 16px; }
  .content h2 { font-size: 1.5em; font-weight: 600; border-bottom: 1px solid #d0d7de; padding-bottom: .3em; margin: 24px 0 16px; }
  .content h3 { font-size: 1.25em; font-weight: 600; margin: 24px 0 12px; }
  .content h4 { font-size: 1em; font-weight: 600; margin: 16px 0 8px; }
  .content p { margin: 0 0 16px; line-height: 1.6; }
  .content ul, .content ol { margin: 0 0 16px; padding-left: 2em; }
  .content li { margin: 4px 0; line-height: 1.6; }
  .content blockquote { border-left: 4px solid #0969da; padding: 0 1em; color: #656d76; margin: 0 0 16px; }
  .content code { background: #eaeef2; padding: 2px 6px; border-radius: 4px; font-size: 0.9em; font-family: "SF Mono", Menlo, monospace; }
  .content pre { background: #1f2328; color: #e6edf3; padding: 16px; border-radius: 8px; overflow-x: auto; margin: 0 0 16px; }
  .content pre code { background: none; padding: 0; color: inherit; }
  .content table { border-collapse: collapse; margin: 0 0 16px; width: 100%; }
  .content th, .content td { border: 1px solid #d0d7de; padding: 8px 12px; text-align: left; }
  .content th { background: #f6f8fa; font-weight: 600; }
  .content a { color: #0969da; text-decoration: none; }
  .content a:hover { text-decoration: underline; }
  .content strong { font-weight: 600; }
  .content hr { border: none; border-top: 1px solid #d0d7de; margin: 24px 0; }
  .content img { max-width: 100%; }

  /* Empty state */
  .empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: #656d76;
    font-size: 15px;
    gap: 8px;
  }

  .empty .icon { font-size: 48px; opacity: 0.4; }
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-header">
    <h1>ADP 客户知识库</h1>
  </div>
  <div class="search-box">
    <input type="text" id="search" placeholder="搜索文件..." autocomplete="off">
  </div>
  <div class="tree" id="tree"></div>
</div>

<div class="main">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="content" id="content">
    <div class="empty">
      <div class="icon">📋</div>
      <div>从左侧选择一个文件开始浏览</div>
    </div>
  </div>
</div>

<script>
let currentPath = '';

async function loadTree() {
  const res = await fetch('/api/tree');
  const data = await res.json();
  const treeEl = document.getElementById('tree');
  treeEl.innerHTML = '';
  renderTree(data, treeEl, 0);
}

function renderTree(node, container, depth) {
  if (!node.children) return;
  node.children.forEach(child => {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.paddingLeft = (12 + depth * 16) + 'px';
    item.dataset.path = child.path;
    item.dataset.name = child.name.toLowerCase();

    if (child.type === 'dir') {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '▶';
      item.appendChild(arrow);

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📁';
      item.appendChild(icon);

      const name = document.createElement('span');
      name.textContent = child.name;
      item.appendChild(name);

      container.appendChild(item);

      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      container.appendChild(childContainer);

      renderTree(child, childContainer, depth + 1);

      item.addEventListener('click', () => {
        arrow.classList.toggle('expanded');
        childContainer.classList.toggle('open');
      });
    } else {
      const spacer = document.createElement('span');
      spacer.style.width = '16px';
      spacer.style.display = 'inline-block';
      item.appendChild(spacer);

      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📄';
      item.appendChild(icon);

      const name = document.createElement('span');
      name.textContent = child.name.replace(/\.md$/i, '');
      item.appendChild(name);

      container.appendChild(item);

      item.addEventListener('click', () => {
        loadFile(child.path, child.name);
      });
    }
  });
}

async function loadFile(path, name) {
  // Update active state
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const activeItem = document.querySelector(`.tree-item[data-path="${CSS.escape(path)}"]`);
  if (activeItem) activeItem.classList.add('active');

  currentPath = path;
  updateBreadcrumb(path);

  const res = await fetch('/api/file?p=' + encodeURIComponent(path));
  const html = await res.text();

  const contentEl = document.getElementById('content');
  contentEl.innerHTML = html;

  // Intercept link clicks in markdown content
  contentEl.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      const href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('#')) return;
      e.preventDefault();
      // Resolve relative path
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
      const resolved = dir ? dir + '/' + href : href;
      loadFile(resolved, href);
    });
  });
}

function updateBreadcrumb(path) {
  const parts = path.split('/');
  const bc = document.getElementById('breadcrumb');
  bc.innerHTML = '<span>' + parts.join(' / ') + '</span>';
}

// Search
document.getElementById('search').addEventListener('input', e => {
  const query = e.target.value.toLowerCase();
  document.querySelectorAll('.tree-item').forEach(item => {
    if (item.dataset.name === undefined) return;
    const match = !query || item.dataset.name.includes(query);
    item.classList.toggle('hidden', !match);
  });
});

// Init
loadTree();
</script>
</body>
</html>
