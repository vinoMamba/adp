<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADP — 客户详情</title>
<script>
  (function(){
    try {
      var saved = localStorage.getItem('adp-theme');
      var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = saved || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
<link rel="stylesheet" href="/static/styles.css">
<link rel="stylesheet" href="/static/highlight.css">
</head>
<body>

<div class="topbar">
  <a class="back" href="/">← 客户列表</a>
  <span class="client-name" id="clientName">…</span>
  <span class="badge" id="statusBadge"></span>
  <span class="count" id="stageText"></span>
  <div class="actions">
    <button class="btn" data-cmd-prefix="/adp-ingest ">摄入</button>
    <button class="btn" data-cmd-prefix="/adp-generate ">生成</button>
    <button class="btn" data-cmd-prefix="/adp-ask ">提问</button>
    <button class="btn" data-cmd-prefix="/adp-review ">审计</button>
  </div>
  <button type="button" class="theme-toggle" data-theme-toggle aria-label="切换深色模式">
    <span class="icon icon-light">☀</span><span class="icon icon-dark">☾</span>
  </button>
</div>

<div class="detail-body">
  <div class="sidebar">
    <div class="sidebar-search">
      <input type="text" id="search" placeholder="搜索文件..." autocomplete="off">
    </div>
    <div class="tree" id="tree"></div>
  </div>

  <div class="main-pane">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="content" id="content">
      <div class="empty">
        <div class="icon">📋</div>
        <div>从左侧选择一个文件开始浏览</div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制到剪贴板</div>

<script>
// Derive the client name from the URL path (single top-level segment).
const pathParts = window.location.pathname.split('/').filter(Boolean);
const name = decodeURIComponent(pathParts[0] || '');
const apiBase = '/' + encodeURIComponent(name);

document.getElementById('clientName').textContent = name;

// Load metadata for the top bar badges.
fetch(apiBase + '/api/meta').then(r => r.json()).then(m => {
  const badge = document.getElementById('statusBadge');
  badge.textContent = m.status;
  badge.className = 'badge badge-' + m.status;
  document.getElementById('stageText').textContent = '阶段：' + (m.stage || '—');
}).catch(() => {});

// Handoff buttons copy the skill command prefixed with the client name.
document.querySelectorAll('.btn[data-cmd-prefix]').forEach(btn => {
  btn.addEventListener('click', async () => {
    const cmd = btn.dataset.cmdPrefix + name;
    try { await navigator.clipboard.writeText(cmd); }
    catch (e) {
      const ta = document.createElement('textarea');
      ta.value = cmd; document.body.appendChild(ta); ta.select();
      document.execCommand('copy'); document.body.removeChild(ta);
    }
    const toast = document.getElementById('toast');
    toast.textContent = '已复制：' + cmd;
    toast.classList.add('show');
    clearTimeout(window.__toast);
    window.__toast = setTimeout(() => toast.classList.remove('show'), 1800);
  });
});

async function loadTree() {
  const res = await fetch(apiBase + '/api/tree');
  const data = await res.json();
  const treeEl = document.getElementById('tree');
  treeEl.innerHTML = '';
  renderTree(data, treeEl, 0);
}

function renderTree(node, container, depth) {
  if (!node.children) return;
  node.children.forEach(child => {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.style.paddingLeft = (12 + depth * 16) + 'px';
    item.dataset.path = child.path;
    item.dataset.name = child.name.toLowerCase();

    if (child.type === 'dir') {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = '▶';
      item.appendChild(arrow);
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📁';
      item.appendChild(icon);
      const n = document.createElement('span');
      n.textContent = child.name;
      item.appendChild(n);
      container.appendChild(item);
      const childContainer = document.createElement('div');
      childContainer.className = 'tree-children';
      container.appendChild(childContainer);
      renderTree(child, childContainer, depth + 1);
      item.addEventListener('click', () => {
        arrow.classList.toggle('expanded');
        childContainer.classList.toggle('open');
      });
    } else {
      const spacer = document.createElement('span');
      spacer.style.width = '16px';
      spacer.style.display = 'inline-block';
      item.appendChild(spacer);
      const icon = document.createElement('span');
      icon.className = 'icon';
      icon.textContent = '📄';
      item.appendChild(icon);
      const n = document.createElement('span');
      n.textContent = child.name.replace(/\.md$/i, '');
      item.appendChild(n);
      container.appendChild(item);
      item.addEventListener('click', () => loadFile(child.path, child.name));
    }
  });
}

async function loadFile(path, fname) {
  document.querySelectorAll('.tree-item.active').forEach(el => el.classList.remove('active'));
  const active = document.querySelector('.tree-item[data-path="' + CSS.escape(path) + '"]');
  if (active) active.classList.add('active');
  updateBreadcrumb(path);
  const res = await fetch(apiBase + '/api/file?p=' + encodeURIComponent(path));
  const html = await res.text();
  const contentEl = document.getElementById('content');
  contentEl.innerHTML = html;
  enhanceContent(contentEl);
  // Intercept relative markdown links.
  contentEl.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', e => {
      const href = a.getAttribute('href');
      if (!href || href.startsWith('http') || href.startsWith('#')) return;
      e.preventDefault();
      const dir = path.includes('/') ? path.substring(0, path.lastIndexOf('/')) : '';
      const resolved = dir ? dir + '/' + href : href;
      loadFile(resolved, href);
    });
  });
}

function updateBreadcrumb(path) {
  const parts = path.split('/');
  document.getElementById('breadcrumb').innerHTML = '<span>' + parts.join(' / ') + '</span>';
}

document.getElementById('search').addEventListener('input', e => {
  const q = e.target.value.toLowerCase();
  document.querySelectorAll('.tree-item').forEach(item => {
    if (item.dataset.name === undefined) return;
    item.classList.toggle('hidden', q && !item.dataset.name.includes(q));
  });
});

// ---- Theme toggle (runs once) ----
(function(){
  var toggles = document.querySelectorAll('[data-theme-toggle]');
  if (!toggles.length) return;
  function refresh(){
    var t = document.documentElement.getAttribute('data-theme') || 'light';
    toggles.forEach(function(btn){
      var label = btn.querySelector('.label');
      if (label) label.textContent = t === 'dark' ? '浅色' : '深色';
    });
  }
  refresh();
  toggles.forEach(function(btn){
    btn.addEventListener('click', function(){
      var current = document.documentElement.getAttribute('data-theme') || 'light';
      var next = current === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      try { localStorage.setItem('adp-theme', next); } catch (e) {}
      refresh();
      document.dispatchEvent(new CustomEvent('adp:themechange', {detail:{theme:next}}));
    });
  });
})();

// ---- enhanceContent: runs after each file's HTML is injected ----
var mermaidLoaded = false;

function enhanceContent(contentEl){
  if (!contentEl) return;

  // Overflow detection on <pre> blocks.
  contentEl.querySelectorAll('pre').forEach(function(pre){
    if (pre.scrollWidth - pre.clientWidth > 1) pre.dataset.overflow = 'true';
    else pre.removeAttribute('data-overflow');
  });

  // Copy button on each fenced code block.
  contentEl.querySelectorAll('pre').forEach(function(pre){
    if (!pre.querySelector(':scope > code')) return;
    if (pre.parentNode.classList.contains('code-block')) return; // already wrapped
    var wrapper = document.createElement('div');
    wrapper.className = 'code-block';
    pre.parentNode.insertBefore(wrapper, pre);
    wrapper.appendChild(pre);
    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'code-copy';
    btn.setAttribute('aria-label', '复制代码');
    btn.textContent = '复制';
    btn.addEventListener('click', function(){
      var code = pre.querySelector('code');
      var text = code ? code.textContent : pre.textContent;
      navigator.clipboard.writeText(text).then(function(){
        btn.textContent = '已复制';
        btn.classList.add('copied');
        setTimeout(function(){ btn.textContent = '复制'; btn.classList.remove('copied'); }, 1500);
      }).catch(function(){});
    });
    wrapper.appendChild(btn);
  });

  // Mermaid — lazy load the bundle once, then render all diagrams in scope.
  var mermaidDivs = contentEl.querySelectorAll('.mermaid');
  if (mermaidDivs.length) {
    mermaidDivs.forEach(function(d){
      // Server base64-encodes the diagram into data-encoded so blank lines in
      // the source don't break Goldmark's HTML-block parsing. Decode here.
      if (d.dataset.encoded) {
        try {
          // atob returns a Latin-1 string; re-decode the bytes as UTF-8 so
          // Chinese / other multibyte labels survive the round-trip.
          var bin = atob(d.dataset.encoded);
          d.dataset.source = new TextDecoder('utf-8').decode(Uint8Array.from(bin, function(c){ return c.charCodeAt(0); }));
        } catch (e) { d.dataset.source = d.textContent.trim(); }
      } else {
        d.dataset.source = d.textContent.trim();
      }
    });
    function renderMermaid(){
      if (!window.mermaid) return;
      var divs = document.querySelectorAll('.content .mermaid');
      divs.forEach(function(d){
        d.removeAttribute('data-processed');
        d.textContent = d.dataset.source;
      });
      var theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'default';
      window.mermaid.initialize({startOnLoad:false, theme: theme, securityLevel:'loose'});
      window.mermaid.run({nodes: Array.prototype.slice.call(divs)}).catch(function(err){
        console.warn('mermaid render failed', err);
      });
    }
    if (!mermaidLoaded) {
      mermaidLoaded = true;
      var s = document.createElement('script');
      s.src = '/static/mermaid.min.js';
      s.onload = function(){ renderMermaid(); document.addEventListener('adp:themechange', renderMermaid); };
      s.onerror = function(){ console.warn('mermaid bundle failed to load'); };
      document.body.appendChild(s);
    } else {
      // Bundle already loaded (previous file); re-render for new content.
      if (window.mermaid) renderMermaid();
    }
  }
}

// Re-check overflow on resize.
window.addEventListener('resize', function(){
  var contentEl = document.getElementById('content');
  if (!contentEl) return;
  contentEl.querySelectorAll('pre').forEach(function(pre){
    if (pre.scrollWidth - pre.clientWidth > 1) pre.dataset.overflow = 'true';
    else pre.removeAttribute('data-overflow');
  });
});

loadTree();
</script>
</body>
</html>
